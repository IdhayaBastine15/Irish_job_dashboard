[build]
  base    = "frontend/"
  publish = "frontend/dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # After deploying on Render, replace this with your actual backend URL
  # e.g. https://irish-job-dashboard-backend.onrender.com/api
  VITE_API_URL = "https://irish-job-dashboard-backend.onrender.com/api"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
