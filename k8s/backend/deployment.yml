apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: irish-jobs
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime deploys
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: irish-job-dashboard-backend:latest   # replace with ECR URI on AWS
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: irish-jobs-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: irish-jobs-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres:5432/irish_jobs"
            - name: SYNC_DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/irish_jobs"
            - name: ADZUNA_APP_ID
              valueFrom:
                secretKeyRef:
                  name: irish-jobs-secrets
                  key: ADZUNA_APP_ID
            - name: ADZUNA_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: irish-jobs-secrets
                  key: ADZUNA_APP_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: irish-jobs-secrets
                  key: ANTHROPIC_API_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
