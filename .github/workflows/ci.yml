name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: irish_jobs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-bdd pytest-asyncio pytest-mock

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/irish_jobs_test
          SYNC_DATABASE_URL: postgresql://postgres:password@localhost:5432/irish_jobs_test
          ELASTICSEARCH_URL: http://localhost:9200
          ANTHROPIC_API_KEY: dummy
          ADZUNA_APP_ID: dummy
          ADZUNA_APP_KEY: dummy
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t irish-job-dashboard-backend ./backend

      - name: Verify image builds successfully
        run: docker image inspect irish-job-dashboard-backend
