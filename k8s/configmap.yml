apiVersion: v1
kind: ConfigMap
metadata:
  name: irish-jobs-config
  namespace: irish-jobs
data:
  ADZUNA_BASE_URL: "https://api.adzuna.com/v1/api/jobs/gb"
  ADZUNA_RESULTS_PER_PAGE: "50"
  ADZUNA_MAX_PAGES: "5"
  SYNC_INTERVAL_HOURS: "6"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  DATABASE_URL: "postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres:5432/irish_jobs"
  SYNC_DATABASE_URL: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/irish_jobs"
